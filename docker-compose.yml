services:
  adhan-manager:
    build: .
    image: adhan-manager:latest
    container_name: adhan-manager
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - adhan-data:/data
    environment:
      HA_TOKEN: "${HA_TOKEN:-}"
      HA_URL: "${HA_URL:-http://homeassistant.local:8123}"
      HA_ENTITY_ID: "${HA_ENTITY_ID:-media_player.bedroom_speaker}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://adhan-manager.local:8090}"
      ADHAN_VOLUME: "${ADHAN_VOLUME:-0.8}"
      ADHAN_PLAY_ATTEMPTS: "${ADHAN_PLAY_ATTEMPTS:-2}"
      ADHAN_PLAY_RETRY_DELAY: "${ADHAN_PLAY_RETRY_DELAY:-4}"
      ADHAN_PRE_PLAY_DELAY: "${ADHAN_PRE_PLAY_DELAY:-1}"
      ADHAN_MEDIA_CONTENT_TYPE: "${ADHAN_MEDIA_CONTENT_TYPE:-audio/mpeg}"
      ADHAN_STOP_BEFORE_PLAY: "${ADHAN_STOP_BEFORE_PLAY:-true}"
      TZ: "${TZ:-Europe/London}"

volumes:
  adhan-data:
