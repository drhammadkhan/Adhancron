services:
  adhan-manager:
    build: .
    image: adhan-manager:latest
    container_name: adhan-manager
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - adhan-data:/data
    environment:
      HA_TOKEN: "${HA_TOKEN:-}"
      HA_URL: "${HA_URL:-http://homeassistant.local:8123}"
      HA_ENTITY_ID: "${HA_ENTITY_ID:-media_player.bedroom_speaker}"
      ADHAN_PLAYBACK_METHOD: "${ADHAN_PLAYBACK_METHOD:-home_assistant}"
      GOOGLE_CAST_HOST: "${GOOGLE_CAST_HOST:-}"
      GOOGLE_CAST_PORT: "${GOOGLE_CAST_PORT:-8009}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      ADHAN_VOLUME: "${ADHAN_VOLUME:-0.8}"
      ADHAN_LATITUDE: "${ADHAN_LATITUDE:-}"
      ADHAN_LONGITUDE: "${ADHAN_LONGITUDE:-}"
      ADHAN_USE_ANNOUNCE: "${ADHAN_USE_ANNOUNCE:-true}"
      ADHAN_PLAY_ATTEMPTS: "${ADHAN_PLAY_ATTEMPTS:-2}"
      ADHAN_PLAYBACK_TIMEOUT: "${ADHAN_PLAYBACK_TIMEOUT:-15}"
      ADHAN_PLAYBACK_POLL_INTERVAL: "${ADHAN_PLAYBACK_POLL_INTERVAL:-1}"
      ADHAN_MEDIA_CONTENT_TYPE: "${ADHAN_MEDIA_CONTENT_TYPE:-audio/mpeg}"
      TZ: "${TZ:-Europe/London}"

volumes:
  adhan-data:
